# Dependabot — solo updates de GitHub Actions.
#
# NO incluimos `package-ecosystem: npm` aquí. La config previa con
# `allow: direct + indirect` abrió 12+ PRs/semana incluyendo majors
# riesgosos (Next 15→16, TypeScript 5→6, Expo SDK bumps). Para version
# updates regulares de npm, Renovate (renovate.json) hace el trabajo
# con grouping y scheduling adecuados.
#
# Para advisories de seguridad, GitHub auto-crea PRs vía Dependabot
# Security Updates (Settings → Code security & analysis), sin yaml.
# Eso es lo que queremos: solo CVEs, NO version bumps regulares.

version: 2
updates:
  # SHAs de Actions — pinned por SHA (audit ronda 4 §26).
  # Sí queremos esto: bumps chicos, generalmente safe, y Renovate
  # por default no maneja github-actions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "type: deps-action"
    commit-message:
      prefix: "chore(actions)"
