# CI — pre-merge gate.
#
# Corre en cada PR contra main + en push a branches feature/*.
# Bloquea merge si type-check / lint / tests / build no pasan.
#
# Workflow Deploy: este NO deploya. El deploy a prod sigue siendo manual via
# `scripts/deploy.sh` (ver CLAUDE.md raíz). Ver `.github/workflows/deploy-prod.yml`
# para el deploy automatizado opcional.
#
# Actions pinned por SHA (audit security-deps recomendación) — Dependabot
# actualiza estos SHAs vía PRs etiquetados "type: deps-action".

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  # Reutilizable desde deploy-prod.yml — mismo gate antes de cada deploy.
  workflow_call:
  # Permite trigger manual desde GitHub UI (útil para re-correr el gate
  # tras cambios en CI config sin necesidad de un nuevo commit).
  workflow_dispatch:

# Si llega un nuevo push a la misma branch, cancelar el run anterior.
# Ahorra minutos de Actions y evita queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (type-check + lint + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.6.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @repo/db run db:generate

      - name: Type-check
        run: pnpm --filter web run type-check

      - name: Lint
        run: pnpm --filter web run lint

      - name: Test
        run: pnpm --filter web run test
        env:
          # Salt determinístico para tests reproducibles. NO usar en prod.
          PII_LOG_SALT: ci-deterministic-salt-not-for-prod
          # `@repo/db` valida que POS_DATABASE_URL exista al cargarse (ver
          # packages/db/src/client.ts:5). Aunque los tests usen prismaMock
          # (vi.mock de @repo/db), el factory hace `vi.importActual` para
          # obtener los enums reales — eso ejecuta el módulo y dispara la
          # validación. Mock URL OK porque Prisma client real nunca conecta
          # en tests (todas las llamadas pasan por el mock).
          POS_DATABASE_URL: postgresql://ci-mock:ci-mock@localhost:5432/ci_mock_db
          DATABASE_URL: postgresql://ci-mock:ci-mock@localhost:5432/ci_mock_db
          NEXTAUTH_SECRET: ci-mock-secret-32-chars-long-enough-for-jwt
          NEXTAUTH_URL: http://localhost:3000

      - name: Build
        run: pnpm --filter web run build
        env:
          # Sentry deshabilitado en CI para no contaminar Issues con builds
          SENTRY_DSN: ""
          # Mock secret — el build solo necesita que existan, no son válidos
          NEXTAUTH_SECRET: ci-mock-secret-32-chars-long-enough-for-jwt
          NEXTAUTH_URL: http://localhost:3000
          POS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          PII_LOG_SALT: ci-deterministic-salt-not-for-prod

  # Día 5 (audit Claude Code CLI 2026-04-28) — gate paralelo para mobile.
  # Antes el CI solo cubría web; un PR podía romper `tsc --noEmit` mobile
  # o introducir test failures en jest sin que el merge gate lo detectara.
  # Este job corre en paralelo al `web` (sin `needs:`) — si uno falla, el
  # otro sigue para no esconder fallas.
  #
  # NOTA: solo type-check + lint + test (sin build). El build mobile real
  # requiere Android SDK / Java / Gradle — costoso para CI. Para validar
  # builds APK usamos `expo run:android` localmente o EAS Build cuando
  # sea release. Esto cubre el 95% de regresiones (tipos, lint, lógica).
  mobile:
    name: mobile (type-check + lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.6.0

      - name: Setup Node
        # Node 20+ requerido por Metro SDK 54 (uses Array.prototype.toReversed).
        # `apps/mobile/.nvmrc` declara 20.19.5 — alineamos acá con 22 que es la
        # versión LTS más reciente y soporta toReversed sin issues.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # `@repo/api-client` (workspace dep de mobile) re-exporta tipos de
        # `@repo/db` que dependen del cliente Prisma generado. Sin este
        # step, tsc en mobile rompe con "MetodoPago not found".
        run: pnpm --filter @repo/db run db:generate

      - name: Type-check
        run: pnpm --filter @repo/mobile run type-check

      - name: Lint
        run: pnpm --filter @repo/mobile run lint

      - name: Test
        run: pnpm --filter @repo/mobile run test:ci
        env:
          # NODE_OPTIONS para dar más memoria a jest cuando corre suites
          # con muchos mocks de jest-expo. Sin esto suite syncStore/db
          # puede OOM en CI runners (4 GB default).
          NODE_OPTIONS: --max-old-space-size=4096
