services:
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pos_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pos_secret_2025}
      POSTGRES_DB: ${POSTGRES_DB:-pos_chile_db}
      TZ: America/Santiago
      PGTZ: America/Santiago
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pos_admin} -d ${POSTGRES_DB:-pos_chile_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: pos-web
    restart: unless-stopped
    environment:
      POS_DATABASE_URL: postgresql://${POSTGRES_USER:-pos_admin}:${POSTGRES_PASSWORD:-pos_secret_2025}@postgres:5432/${POSTGRES_DB:-pos_chile_db}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-generar-con-openssl-rand-base64-32}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-1}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NODE_ENV: production
      TZ: America/Santiago
    ports:
      - "3000:3000"
    networks:
      - pos-network
    healthcheck:
      # alpine minimal no trae curl; wget sí está en /usr/bin/wget (GAP-02).
      # Usar 127.0.0.1 explícito (NO "localhost") — alpine resuelve localhost
      # a ::1 IPv6 y Next.js escucha solo en IPv4 0.0.0.0 → Connection refused.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pos-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@pos-chile.cl}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin_secret_2025}
      PGADMIN_LISTEN_PORT: 80
      # SMTP Gmail config para reset-password de pgAdmin.
      # Credenciales (USERNAME/PASSWORD/SENDER) vienen de .env.docker (gitignored).
      # Si no están seteadas, se inyecta el literal '' y pgAdmin lo trata como
      # "sin mail server" — el container igual arranca sin romper.
      PGADMIN_CONFIG_MAIL_SERVER: "'smtp.gmail.com'"
      PGADMIN_CONFIG_MAIL_PORT: "587"
      PGADMIN_CONFIG_MAIL_USE_TLS: "True"
      PGADMIN_CONFIG_MAIL_USERNAME: "${PGADMIN_MAIL_USERNAME:-''}"
      PGADMIN_CONFIG_MAIL_PASSWORD: "${PGADMIN_MAIL_PASSWORD:-''}"
      PGADMIN_CONFIG_SECURITY_EMAIL_SENDER: "${PGADMIN_MAIL_SENDER:-''}"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pos-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
    name: pos-postgres-data
  pgadmin_data:
    driver: local
    name: pos-pgadmin-data

networks:
  pos-network:
    driver: bridge
    name: pos-chile-network
